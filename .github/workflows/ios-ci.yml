name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (iOS Simulator, no signing)
        run: |
          xcodebuild \
            -project MorningRoutinePhotoArchiver.xcodeproj \
            -scheme MorningRoutinePhotoArchiver \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
