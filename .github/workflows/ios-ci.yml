name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS app
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select simulator device
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          raw = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "--json"], text=True)
          data = json.loads(raw)

          choices = ["iPhone 16 Pro", "iPhone 16", "iPhone 15 Pro", "iPhone 15"]
          selected = None

          for runtime_devices in data.get("devices", {}).values():
              for device in runtime_devices:
                  if device.get("name") in choices and device.get("isAvailable"):
                      selected = (device["udid"], device["name"])
                      break
              if selected:
                  break

          if not selected:
              raise SystemExit("No supported iPhone simulator found")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"SIMULATOR_UDID={selected[0]}\n")
              env.write(f"SIMULATOR_NAME={selected[1]}\n")

          print(f"Selected simulator: {selected[1]} ({selected[0]})")
          PY

      - name: Build (iOS Simulator, no signing)
        run: |
          DERIVED_DATA="${RUNNER_TEMP}/DerivedData"
          xcodebuild \
            -project MorningRoutinePhotoArchiver.xcodeproj \
            -scheme MorningRoutinePhotoArchiver \
            -destination "id=${SIMULATOR_UDID}" \
            -configuration Debug \
            -derivedDataPath "${DERIVED_DATA}" \
            APP_SHORTCUTS_ENABLE_FLEXIBLE_MATCHING=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Capture simulator screenshot
        run: |
          DERIVED_DATA="${RUNNER_TEMP}/DerivedData"
          BUNDLE_ID="com.evanpurkhiser"
          APP_PATH="${DERIVED_DATA}/Build/Products/Debug-iphonesimulator/MorningRoutinePhotoArchiver.app"
          mkdir -p artifacts/screenshots
          SAFE_SIMULATOR_NAME="${SIMULATOR_NAME// /-}"
          xcrun simctl boot "${SIMULATOR_UDID}" || true
          xcrun simctl bootstatus "${SIMULATOR_UDID}" -b
          xcrun simctl privacy "${SIMULATOR_UDID}" grant camera "${BUNDLE_ID}" || true
          xcrun simctl privacy "${SIMULATOR_UDID}" grant photos "${BUNDLE_ID}" || true
          xcrun simctl privacy "${SIMULATOR_UDID}" grant photos-add "${BUNDLE_ID}" || true
          if xcrun simctl install "${SIMULATOR_UDID}" "${APP_PATH}"; then
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/home-before-launch-${SAFE_SIMULATOR_NAME}.png"

            # Trigger the capture via URL scheme to simulate NFC/Shortcut launch
            echo "Triggering capture via URL scheme..."
            xcrun simctl openurl "${SIMULATOR_UDID}" "morningroutine://startCapture"

            # Take screenshots at different intervals during the capture sequence
            # Get Ready: 2s, then each angle: 4s positioning + 3s countdown + capture
            # Total sequence: 2s + (4+3)*5 = 37 seconds
            sleep 1  # App launch
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/1-get-ready-${SAFE_SIMULATOR_NAME}.png"

            sleep 3  # During first angle positioning
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/2-front-positioning-${SAFE_SIMULATOR_NAME}.png"

            sleep 4  # During countdown
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/3-front-countdown-${SAFE_SIMULATOR_NAME}.png"

            sleep 8  # Next angle positioning
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/4-right-positioning-${SAFE_SIMULATOR_NAME}.png"

            sleep 10  # Mid-sequence
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/5-back-countdown-${SAFE_SIMULATOR_NAME}.png"

            sleep 10  # Near end
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/6-face-capture-${SAFE_SIMULATOR_NAME}.png"

            sleep 5  # Completion
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/7-done-${SAFE_SIMULATOR_NAME}.png"
          else
            echo "App install failed; capturing simulator home screen instead."
            xcrun simctl io "${SIMULATOR_UDID}" screenshot "artifacts/screenshots/home-install-fallback-${SAFE_SIMULATOR_NAME}.png"
          fi

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: artifacts/screenshots/*.png
          if-no-files-found: warn
